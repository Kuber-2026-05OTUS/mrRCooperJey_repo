apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  namespace: homework
  labels:
    app: homework
spec:
  replicas: 3
  selector:
    matchLabels:
      app: homework

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0

  template:
    metadata:
      labels:
        app: homework
    spec:
      nodeSelector:
        homework: "true"

      volumes:
      - name: homework-volume
        emptyDir: {}

      containers:
      - name: nginx
        image: nginx:alpine
        ports:
          - containerPort: 8000
        volumeMounts:
          - name: homework-volume
            mountPath: /homework
        command: ["/bin/sh", "-c"]
        args:
          - |
            ln -sf /homework/index.html /usr/share/nginx/html/index.html
            sed -i 's/listen       80;/listen       8000;/g' /etc/nginx/conf.d/default.conf
            nginx -g 'daemon off;'
        readinessProbe:
          exec:
            command:
              - test
              - -f
              - /homework/index.html
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "rm -f /homework/index.html"]

      initContainers:
        - name: init-container
          image: busybox
          command:
            - wget
            - -O
            - /init/index.html
            - http://example.com
          volumeMounts:
            - name: homework-volume
              mountPath: /init
