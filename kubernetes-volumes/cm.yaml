apiVersion: v1
kind: ConfigMap
metadata:
  name: homework-config-map
  namespace: homework
data:
  VARIABLE_1: "1"
  VARIABLE_2: "2"
  VARIABLE_3: "3"
  index.html: |
    <!DOCTYPE html>
    <html lang="ru">
    <head>
      <meta charset="UTF-8" />
      <title>Приветствие</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          color: #fff;
          overflow: hidden;
        }
        .container {
          text-align: center;
          position: relative;
          z-index: 2;
        }
        h1 {
          font-size: 4rem;
          margin-bottom: 1rem;
          opacity: 0;
          animation: fadeInDown 1.5s ease-out forwards;
          text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        p {
          font-size: 1.5rem;
          opacity: 0;
          animation: fadeInUp 1.5s ease-out 0.5s forwards;
          color: #e0e0e0;
        }
        .circle {
          position: absolute;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.1);
          animation: float 6s ease-in-out infinite;
          z-index: 1;
        }
        .circle:nth-child(1) {
          width: 200px;
          height: 200px;
          top: 10%;
          left: 10%;
          animation-delay: 0s;
        }
        .circle:nth-child(2) {
          width: 150px;
          height: 150px;
          top: 60%;
          right: 15%;
          animation-delay: 1s;
        }
        .circle:nth-child(3) {
          width: 100px;
          height: 100px;
          bottom: 15%;
          left: 20%;
          animation-delay: 2s;
        }
        @keyframes fadeInDown {
          from {
            opacity: 0;
            transform: translateY(-50px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(50px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        @keyframes float {
          0%, 100% {
            transform: translateY(0) scale(1);
          }
          50% {
            transform: translateY(-20px) scale(1.1);
          }
        }
      </style>
    </head>
    <body>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="container">
        <h1>👋 Привет!</h1>
        <p>Добро пожаловать на нашу страницу</p>
      </div>
    </body>
    </html>